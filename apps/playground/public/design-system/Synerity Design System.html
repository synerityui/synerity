<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { height: 100%; }
  @keyframes syn-spin { to { transform: rotate(360deg); } }
  @keyframes syn-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes syn-slide { from { transform: translateX(0); } to { transform: translateX(calc(100% - 14px)); } }
  ::selection { background: var(--syn-primary-subtle); color: var(--syn-text); }
</style>
